<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f0eb;
    --surface: #e8e5de;
    --border: #c8c4bb;
    --text: #1a1916;
    --text-muted: #6b6860;
    --btn-bg: #1a1916;
    --btn-text: #f2f0eb;
    --shadow: rgba(0,0,0,0.12);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1d1a;
      --border: #333128;
      --text: #f0ede6;
      --text-muted: #7a7770;
      --btn-bg: #f0ede6;
      --btn-text: #141412;
      --shadow: rgba(0,0,0,0.5);
    }
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 90vw;
    max-width: 1400px;
    padding: 32px 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .video-aspect {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 12px 48px var(--shadow);
  }

  .video-aspect iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Black bar over YouTube logo (top-right) */
  .overlay-logo {
    position: absolute;
    top: 0; right: 0;
    width: 180px; height: 52px;
    background: #000;
    z-index: 5;
    pointer-events: none;
  }

  /* Gradient to hide title/channel on hover */
  .overlay-title {
    position: absolute;
    top: 0; left: 0;
    width: calc(100% - 180px); height: 80px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
    z-index: 4;
    pointer-events: none;
  }

  .selector-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .selector {
    display: flex;
    gap: 10px;
  }

  .sel-btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    width: 64px; height: 64px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
  }
  .sel-btn:hover {
    border-color: var(--text);
    color: var(--text);
    transform: translateY(-2px);
  }
  .sel-btn.active {
    background: var(--btn-bg);
    color: var(--btn-text);
    border-color: var(--btn-bg);
  }

  .status-bar {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header-title">Quiz Player</div>

  <div class="video-aspect" id="videoBox">
    <iframe
      id="ytIframe"
      src=""
      allow="autoplay; encrypted-media; fullscreen"
      allowfullscreen>
    </iframe>
    <div class="overlay-logo"></div>
    <div class="overlay-title"></div>
  </div>

  <div class="selector-row">
    <div class="selector" id="selector">
      <button class="sel-btn active" data-idx="0">1</button>
      <button class="sel-btn"        data-idx="1">2</button>
      <button class="sel-btn"        data-idx="2">3</button>
      <button class="sel-btn"        data-idx="3">4</button>
    </div>
    <span class="status-bar" id="statusBar">動画 1 を選択中</span>
  </div>
</div>

<script>
// ============================================================
// ★ ここに動画IDを入力してください ★
// YouTubeのURLの ?v= の後の文字列です
// 例: https://www.youtube.com/watch?v=UkWd0azv3fQ → "UkWd0azv3fQ"
// ============================================================
const VIDEO_IDS = [
  "0w9vjCToTPQ",   // 動画1
  "dYyK3veepXA",   // 動画2
  "Hs-gxOofX1s",   // 動画3
  "2_HQTXR-l8o",   // 動画4
];
// ============================================================

function buildSrc(id) {
  return "https://www.youtube.com/embed/" + id
    + "?rel=0&modestbranding=1&iv_load_policy=3&playsinline=1";
}

let currentIdx = 0;

function loadVideo(idx) {
  currentIdx = idx;
  document.getElementById('ytIframe').src = buildSrc(VIDEO_IDS[idx]);
  document.getElementById('statusBar').textContent = "動画 " + (idx + 1) + " を選択中";
  document.querySelectorAll('.sel-btn').forEach((b, i) =>
    b.classList.toggle('active', i === idx)
  );
}

// 最初の動画を読み込む
loadVideo(0);

// ボタン切り替え
document.getElementById('selector').addEventListener('click', e => {
  const btn = e.target.closest('.sel-btn');
  if (!btn) return;
  const idx = +btn.dataset.idx;
  if (idx !== currentIdx) loadVideo(idx);
});
</script>
</body>
</html>
